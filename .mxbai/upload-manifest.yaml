version: "1"

defaults:
  strategy: fast
  metadata:
    repo: assisto

files:
  # Mixedbread upload currently rejects JSON, YAML, and shell files for this store.
  # Keep those configs out of the manifest instead of producing noisy 422 failures.
  - path: AGENTS.md
    metadata:
      kind: docs
      domain: agent-instructions
      importance: high

  - path: README.md
    metadata:
      kind: docs
      domain: overview
      importance: high

  - path: eslint.config.mjs
    metadata:
      kind: config
      domain: lint

  - path: "docs/**/*.md"
    metadata:
      kind: docs
      domain: architecture

  - path: "memory/schema/**/*.md"
    metadata:
      kind: memory-schema
      domain: schema

  - path: "memory/indexes/README.md"
    metadata:
      kind: docs
      domain: derived-indexes

  - path: "packages/core/src/**/*.ts"
    metadata:
      kind: source
      package: core

  - path: "packages/cli/src/**/*.ts"
    metadata:
      kind: source
      package: cli

  - path: "packages/cli/bin/**/*.mjs"
    metadata:
      kind: source
      package: cli

  - path: "packages/pi-extension/src/**/*.ts"
    metadata:
      kind: source
      package: pi-extension

  - path: ".pi/**/*.md"
    metadata:
      kind: runtime
      package: pi

  - path: "tests/**/*.mjs"
    metadata:
      kind: test

  - path: "tests/**/*.md"
    metadata:
      kind: test
