name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validation:
    name: Validation Matrix
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.4 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit and integration tests
        run: pnpm test

      - name: Near-E2E tests
        run: pnpm test:e2e

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Browser E2E tests
        run: pnpm test:browser

      - name: MVP eval
        run: pnpm eval:mvp

      - name: v2 eval
        run: pnpm eval:v2

      - name: v3 eval
        run: pnpm eval:v3

      - name: Retrieval eval
        run: pnpm eval:retrieval

      - name: v4 eval
        run: pnpm eval:v4

      - name: v5 eval
        run: pnpm eval:v5

      - name: v6 eval
        run: pnpm eval:v6

      - name: Dogfood local eval
        run: pnpm eval:dogfood-local

      - name: v7 eval
        run: pnpm eval:v7
